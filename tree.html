<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vanshavali — Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF5E9;--bg2:#F4EAD5;--bg3:#EDE0C4;
  --surface:#fff;--border:#DFC99E;--border2:#C4A055;
  --ink:#241406;--bark:#5A3310;--muted:#8C6B3E;--faint:#C8A870;
  --gold:#B07A08;--gold2:#D09A18;--gold-dim:rgba(176,122,8,0.09);
  --saffron:#C4781A;
  --leaf:#2E6B20;--leaf2:#3E8A2C;--leaf-dim:rgba(46,107,32,0.1);
  --terra:#A84818;--terra-dim:rgba(168,72,24,0.1);
  --sky:#3A6E8A;--sky-dim:rgba(58,110,138,0.1);
  --sh:0 2px 10px rgba(80,48,8,0.09);
  --sh2:0 4px 20px rgba(80,48,8,0.14);
}
html,body{height:100%;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;font-weight:300;color:var(--ink);display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{
  padding:11px 18px;border-bottom:1px solid var(--border);
  background:rgba(251,245,233,0.97);display:flex;align-items:center;gap:10px;
  flex-shrink:0;box-shadow:0 1px 6px rgba(80,48,8,0.07);z-index:60;
}
.logo{font-family:'Yeseva One',serif;font-size:1rem;color:var(--gold)}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.lang-btns{display:flex;gap:3px}
.lb{padding:4px 9px;font-size:11px;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;border-radius:4px;font-family:'DM Sans',sans-serif;
  font-weight:500;transition:all .2s}
.lb.active{border-color:var(--gold2);color:var(--gold);background:var(--gold-dim)}
.share-btn{padding:6px 12px;background:var(--gold);color:white;border:none;border-radius:5px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.share-btn:hover{background:var(--gold2)}

/* ── CANVAS ── */
#canvas{flex:1;overflow:auto;position:relative;background:var(--bg)}

/* ── TREE WRAP — HTML layout ── */
#treeWrap{
  position:relative;
  min-width:100%;
  padding:40px 40px 60px;
  display:inline-block;/* shrink-wrap to content */
}

/* SVG overlay for lines */
#linesSvg{
  position:absolute;top:0;left:0;
  pointer-events:none;overflow:visible;
  width:100%;height:100%;
}

/* ── GENERATION ROWS ── */
.gen-row{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  margin-bottom:70px;/* space for lines */
  position:relative;
  flex-wrap:nowrap;
}
.gen-row:last-child{margin-bottom:0}

/* ── NODE CARD ── */
.node-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.node{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:0;
  min-width:140px;
  max-width:160px;
  box-shadow:var(--sh);
  cursor:pointer;
  transition:box-shadow .2s,transform .15s;
  overflow:hidden;
  position:relative;
}
.node:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.node.you{border:2px solid var(--gold2);background:#FFFCF0}
.node.you .node-top-bar{display:block}
.node-top-bar{display:none;height:3px;background:var(--gold2);width:100%}
.node-inner{padding:10px 12px}
.node-role{
  font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:5px;
}
.role-you{color:var(--terra)}
.role-parent{color:var(--leaf2)}
.role-spouse{color:#6A4A10}
.role-sibling{color:var(--sky)}
.role-child{color:var(--leaf)}
.role-gp{color:#8C5A20}
.role-other{color:var(--muted)}
.node-name{
  font-size:13px;font-weight:500;color:var(--bark);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.node-detail{font-size:10px;color:var(--muted);margin-top:3px}
.node-edit{
  position:absolute;top:4px;right:4px;
  width:20px;height:20px;border-radius:4px;
  background:var(--bg2);border:none;cursor:pointer;
  font-size:10px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.node-edit:hover{background:var(--bg3);color:var(--bark)}
.node.placeholder{
  background:var(--bg2);border-style:dashed;
  border-color:rgba(200,160,80,0.4);
}
.node.placeholder .node-name{color:var(--faint);font-weight:300;font-size:11px}

/* ── ADD BUTTON ── */
.add-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--gold);font-weight:600;
  transition:all .2s;box-shadow:var(--sh);
  font-family:'DM Sans',sans-serif;
}
.add-btn:hover{background:var(--gold-dim);border-color:var(--gold);transform:scale(1.1)}

/* ── LANGUAGE OVERLAY ── */
#langOverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(251,245,233,0.98);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.lp{width:100%;max-width:360px}
.lp-top{text-align:center;margin-bottom:22px}
.lp-icon{font-size:2.4rem;margin-bottom:10px}
.lp-title{font-family:'Yeseva One',serif;font-size:1.4rem;color:var(--bark);margin-bottom:5px}
.lp-sub{font-size:12.5px;color:var(--muted)}
.lp-opts{display:flex;flex-direction:column;gap:9px}
.lpo{display:flex;align-items:center;gap:13px;padding:15px 17px;background:white;
  border:2px solid var(--border);border-radius:8px;cursor:pointer;box-shadow:var(--sh);
  transition:all .2s;position:relative;overflow:hidden}
.lpo::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.lpo.en::before{background:#4A8AAA}
.lpo.te::before{background:var(--saffron)}
.lpo.hi::before{background:var(--leaf2)}
.lpo:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.lpo-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.lpo.en .lpo-ico{background:#E8F2F8}
.lpo.te .lpo-ico{background:#FFF0E0}
.lpo.hi .lpo-ico{background:#EEF8EC}
.lpo-nm{font-family:'Yeseva One',serif;font-size:.95rem;margin-bottom:2px}
.lpo.en .lpo-nm{color:#2A4A5A}
.lpo.te .lpo-nm{color:#7A3A10}
.lpo.hi .lpo-nm{color:#2A5A20}
.lpo-ds{font-size:11px;color:var(--muted)}
.lpo-ar{margin-left:auto;font-size:16px;color:var(--faint)}

/* ── BOTTOM SHEET ── */
#sheetBg{position:fixed;inset:0;z-index:100;background:rgba(36,20,6,0.35);display:none;backdrop-filter:blur(3px)}
#sheetBg.show{display:block}
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:white;
  border-radius:16px 16px 0 0;box-shadow:0 -4px 32px rgba(80,48,8,0.18);
  max-height:85vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.3,1)}
#sheet.show{transform:translateY(0)}
.sh-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0}
.sh-head{padding:14px 17px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sh-title{font-family:'Yeseva One',serif;font-size:.95rem;color:var(--bark)}
.sh-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.sh-close{margin-left:auto;width:26px;height:26px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;font-size:13px;color:var(--muted)}
.sh-body{padding:13px 17px 24px}
.sh-sect{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:10px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px}
.rb{display:flex;align-items:center;gap:7px;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;text-align:left}
.rb:hover{border-color:var(--gold2);background:var(--gold-dim)}
.rb.taken{opacity:.45;cursor:default;background:var(--bg2)}
.rb-icon{font-size:1rem;flex-shrink:0}
.rb-label{font-size:12px;font-weight:500;color:var(--bark)}
.rb-sub{font-size:9.5px;color:var(--muted);margin-top:1px}
.rb-tick{margin-left:auto;font-size:11px;color:var(--leaf2)}
#addForm{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px;display:none;margin-top:4px}
#addForm.show{display:block}
.af-title{font-family:'Yeseva One',serif;font-size:.9rem;color:var(--bark);margin-bottom:10px}
.af-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.af-fg{display:flex;flex-direction:column;gap:3px}
.af-fg.full{grid-column:1/-1}
.af-lbl{font-size:10.5px;color:var(--muted);font-weight:500}
input.afi{padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%}
input.afi:focus{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(176,122,8,0.1)}
input.afi::placeholder{color:var(--faint)}
.nk-hint{grid-column:1/-1;font-size:11px;color:var(--gold);background:#FFFBEF;border:1px solid rgba(176,122,8,0.22);border-radius:5px;padding:6px 10px;display:none}
.af-btns{display:flex;gap:7px}
.af-back{padding:9px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer}
.af-save{flex:1;padding:9px;border:none;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--saffron));color:white;font-family:'Yeseva One',serif;font-size:.85rem;cursor:pointer}
#editForm{display:none}
#editForm.show{display:block}
.ef-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.ef-fg{display:flex;flex-direction:column;gap:3px}
.ef-fg.full{grid-column:1/-1}
.ef-lbl{font-size:10.5px;color:var(--muted);font-weight:500}
input.efi,textarea.efi{padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%}
input.efi:focus,textarea.efi:focus{border-color:var(--gold2)}
textarea.efi{resize:none;height:44px;font-size:12px}
.ef-btns{display:flex;gap:7px}
.ef-del{padding:9px 13px;border:1px solid rgba(168,72,24,0.3);border-radius:6px;background:var(--terra-dim);color:var(--terra);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.ef-save{flex:1;padding:9px;border:none;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--saffron));color:white;font-family:'Yeseva One',serif;font-size:.85rem;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bark);color:white;padding:9px 18px;border-radius:7px;font-size:12.5px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Confetti */
@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(540deg);opacity:0}}
.cp{position:fixed;top:-8px;pointer-events:none;animation:fall 3s ease-in forwards;border-radius:2px;z-index:250}
</style>
</head>
<body>

<header>
  <div class="logo">🌳 Vanshavali</div>
  <div class="hright">
    <div class="lang-btns">
      <button class="lb active" onclick="setLang('en')">EN</button>
      <button class="lb" onclick="setLang('te')">తె</button>
      <button class="lb" onclick="setLang('hi')">हि</button>
    </div>
    <button class="share-btn" onclick="shareTree()">📱 Share</button>
  </div>
</header>

<div id="canvas">
  <div id="treeWrap">
    <svg id="linesSvg"></svg>
    <!-- gen rows injected here by JS -->
  </div>
</div>

<!-- Language overlay -->
<div id="langOverlay">
  <div class="lp">
    <div class="lp-top"><div class="lp-icon">🌳</div>
      <div class="lp-title">Vanshavali</div>
      <div class="lp-sub">Choose your language to begin</div></div>
    <div class="lp-opts">
      <button class="lpo en" onclick="startLang('en')"><div class="lpo-ico">🇬🇧</div><div><div class="lpo-nm">English</div><div class="lpo-ds">Build your family tree in English</div></div><div class="lpo-ar">›</div></button>
      <button class="lpo te" onclick="startLang('te')"><div class="lpo-ico">🌺</div><div><div class="lpo-nm">తెలుగు</div><div class="lpo-ds">తెలుగులో కుటుంబ వృక్షం</div></div><div class="lpo-ar">›</div></button>
      <button class="lpo hi" onclick="startLang('hi')"><div class="lpo-ico">🇮🇳</div><div><div class="lpo-nm">हिंदी</div><div class="lpo-ds">हिंदी में पारिवारिक पेड़</div></div><div class="lpo-ar">›</div></button>
    </div>
  </div>
</div>

<div id="sheetBg" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-head">
    <div><div class="sh-title" id="shTitle">Add family</div><div class="sh-sub" id="shSub"></div></div>
    <button class="sh-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sh-body">
    <div id="relPicker"></div>
    <div id="addForm">
      <div class="af-title" id="afTitle">Add person</div>
      <div class="af-grid">
        <div class="af-fg full"><div class="af-lbl" id="afLN">Full name</div>
          <input class="afi" type="text" id="af-name" placeholder="Name" onkeydown="if(event.key==='Enter')savePerson()"></div>
        <div class="af-fg"><div class="af-lbl" id="afLD">Birth year</div>
          <input class="afi" type="text" maxlength="4" id="af-dob" placeholder="1945" onkeydown="if(event.key==='Enter')savePerson()"></div>
        <div class="af-fg"><div class="af-lbl" id="afLC">City / Village</div>
          <input class="afi" type="text" id="af-city" placeholder="Hyderabad" onkeydown="if(event.key==='Enter')savePerson()"></div>
        <div class="af-fg"><div class="af-lbl" id="afLG">Gotra</div>
          <input class="afi" type="text" id="af-gotra" placeholder="Bharadwaj" onkeydown="if(event.key==='Enter')savePerson()"></div>
        <div class="af-fg"><div class="af-lbl" id="afLK">Nakshatra</div>
          <input class="afi" type="text" id="af-naksh" placeholder="Rohini" oninput="chkNk()"></div>
        <div class="nk-hint" id="nkHint"></div>
      </div>
      <div class="af-btns">
        <button class="af-back" onclick="backToRels()">← Back</button>
        <button class="af-save" onclick="savePerson()">Add to Tree ✓</button>
      </div>
    </div>
    <div id="editForm">
      <div class="ef-grid">
        <div class="ef-fg full"><div class="ef-lbl" id="efLN">Full name</div>
          <input class="efi" type="text" id="ef-name"></div>
        <div class="ef-fg"><div class="ef-lbl" id="efLD">Birth year</div>
          <input class="efi" type="text" maxlength="4" id="ef-dob"></div>
        <div class="ef-fg"><div class="ef-lbl" id="efLC">City / Village</div>
          <input class="efi" type="text" id="ef-city"></div>
        <div class="ef-fg"><div class="ef-lbl" id="efLG">Gotra</div>
          <input class="efi" type="text" id="ef-gotra"></div>
        <div class="ef-fg"><div class="ef-lbl" id="efLK">Nakshatra</div>
          <input class="efi" type="text" id="ef-naksh"></div>
        <div class="ef-fg full"><div class="ef-lbl" id="efLT">Notes</div>
          <textarea class="efi" id="ef-notes" placeholder="Profession, stories…"></textarea></div>
      </div>
      <div class="ef-btns">
        <button class="ef-del" onclick="delPerson()">🗑 Remove</button>
        <button class="ef-save" onclick="saveEdit()">Save ✓</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════ LANGUAGE ══════════════
const NK=['Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra','Punarvasu','Pushya','Ashlesha','Magha','Purva Phalguni','Uttara Phalguni','Hasta','Chitra','Swati','Vishakha','Anuradha','Jyeshtha','Mula','Purva Ashadha','Uttara Ashadha','Shravana','Dhanishtha','Shatabhisha','Purva Bhadrapada','Uttara Bhadrapada','Revati'];

const RELS={
en:{s1:'Immediate family',s2:'Extended family',
  r:[{k:'father',i:'👨',l:'Father',s:"His/her father",max:1},
    {k:'mother',i:'👩',l:'Mother',s:"His/her mother",max:1},
    {k:'spouse',i:'💑',l:'Spouse',s:'Husband / Wife',max:1},
    {k:'son',i:'👦',l:'Son',s:'Male child',max:99},
    {k:'daughter',i:'👧',l:'Daughter',s:'Female child',max:99},
    {k:'brother',i:'🧑',l:'Brother',s:'Male sibling',max:99},
    {k:'sister',i:'👩',l:'Sister',s:'Female sibling',max:99},
    {k:'patgf',i:'👴',l:'Pat. Grandfather',s:"Father's father",max:1},
    {k:'patgm',i:'👵',l:'Pat. Grandmother',s:"Father's mother",max:1},
    {k:'matgf',i:'👴',l:'Mat. Grandfather',s:"Mother's father",max:1},
    {k:'matgm',i:'👵',l:'Mat. Grandmother',s:"Mother's mother",max:1},
    {k:'nephew',i:'🧒',l:'Nephew',s:"Sibling's son",max:99},
    {k:'niece',i:'🧒',l:'Niece',s:"Sibling's daughter",max:99},
    {k:'uncle',i:'👨',l:'Uncle',s:"Parent's brother",max:99},
    {k:'aunt',i:'👩',l:'Aunt',s:"Parent's sister",max:99},
    {k:'grandchild',i:'👶',l:'Grandchild',s:"Child's child",max:99}]},
te:{s1:'సమీప కుటుంబం',s2:'దూర కుటుంబం',
  r:[{k:'father',i:'👨',l:'నాన్న',s:'తండ్రి',max:1},
    {k:'mother',i:'👩',l:'అమ్మ',s:'తల్లి',max:1},
    {k:'spouse',i:'💑',l:'జీవిత భాగస్వామి',s:'భర్త / భార్య',max:1},
    {k:'son',i:'👦',l:'కొడుకు',s:'మగ పిల్లవాడు',max:99},
    {k:'daughter',i:'👧',l:'కూతురు',s:'ఆడ పిల్ల',max:99},
    {k:'brother',i:'🧑',l:'అన్న / తమ్ముడు',s:'సోదరుడు',max:99},
    {k:'sister',i:'👩',l:'అక్క / చెల్లి',s:'సోదరి',max:99},
    {k:'patgf',i:'👴',l:'తాతయ్య (నాన్న)',s:"నాన్న తండ్రి",max:1},
    {k:'patgm',i:'👵',l:'నాయనమ్మ',s:"నాన్న తల్లి",max:1},
    {k:'matgf',i:'👴',l:'తాతయ్య (అమ్మ)',s:"అమ్మ తండ్రి",max:1},
    {k:'matgm',i:'👵',l:'అమ్మమ్మ',s:"అమ్మ తల్లి",max:1},
    {k:'nephew',i:'🧒',l:'మేనల్లుడు',s:"సోదరుని కొడుకు",max:99},
    {k:'niece',i:'🧒',l:'మేనకోడలు',s:"సోదరి కూతురు",max:99},
    {k:'uncle',i:'👨',l:'మావయ్య',s:"తల్లిదండ్రుల సోదరుడు",max:99},

function getParents(p){return edges.filter(e=>e.t==='pc'&&e.b===p).map(e=>e.a)}
function getChildren(p){return edges.filter(e=>e.t==='pc'&&e.a===p).map(e=>e.b)}
function getSpouses(p){return edges.filter(e=>e.t==='sp'&&(e.a===p||e.b===p)).map(e=>e.a===p?e.b:e.a)}
function getSiblings(p){return edges.filter(e=>e.t==='sib'&&(e.a===p||e.b===p)).map(e=>e.a===p?e.b:e.a)}
function hasEdge(a,b,t){return edges.some(e=>e.t===t&&((e.a===a&&e.b===b)||(e.a===b&&e.b===a)))}
function addE(a,b,t){if(a&&b&&a!==b&&!hasEdge(a,b,t))edges.push({a,b,t})}

function buildGrid(pid){
  const cfg=rl();const el=document.getElementById('relPicker');
  el.innerHTML='';
  const s1=document.createElement('div');s1.className='sh-sect';s1.textContent=cfg.s1;el.appendChild(s1);

    btn.className='rb'+(taken?' taken':'');
    btn.innerHTML=`<span class="rb-icon">${rel.i}</span><span><div class="rb-label">${rel.l}</div><div class="rb-sub">${rel.s}</div></span>${taken?'<span class="rb-tick">✓</span>':''}`;

  });

function isTaken(pid,rel){
  if(rel.max!==1)return false;
  if(rel.k==='father')return getParents(pid).some(id=>!persons[id]?.isMother);
  if(rel.k==='mother')return getParents(pid).some(id=>persons[id]?.isMother);
  if(rel.k==='spouse')return getSpouses(pid).length>0;
  if(rel.k==='patgf'){const f=getParents(pid).find(id=>!persons[id]?.isMother);return f?getParents(f).some(id=>!persons[id]?.isMother):false}
  if(rel.k==='patgm'){const f=getParents(pid).find(id=>!persons[id]?.isMother);return f?getParents(f).some(id=>persons[id]?.isMother):false}
  if(rel.k==='matgf'){const m=getParents(pid).find(id=>persons[id]?.isMother);return m?getParents(m).some(id=>!persons[id]?.isMother):false}
  if(rel.k==='matgm'){const m=getParents(pid).find(id=>persons[id]?.isMother);return m?getParents(m).some(id=>persons[id]?.isMother):false}
  return false;
}

function savePerson(){
  const name=gv('af-name').trim();if(!name){document.getElementById('af-name').focus();return}
  const newId=uid();
  persons[newId]={name,dob:gv('af-dob'),city:gv('af-city'),gotra:gv('af-gotra'),naksh:gv('af-naksh'),notes:''};
  const pid=shPid,k=pendRel.k;

  if(k==='father'){
    persons[newId].isMother=false;addE(newId,pid,'pc');
    const m=getParents(pid).find(id=>persons[id]?.isMother);if(m)addE(newId,m,'sp');
    // connect to all siblings
    getSiblings(pid).forEach(sib=>addE(newId,sib,'pc'));
  }
  else if(k==='mother'){
    persons[newId].isMother=true;addE(newId,pid,'pc');
    const f=getParents(pid).find(id=>!persons[id]?.isMother);if(f)addE(f,newId,'sp');
    getSiblings(pid).forEach(sib=>addE(newId,sib,'pc'));
  }
  else if(k==='spouse'){addE(pid,newId,'sp')}
  else if(k==='son'||k==='daughter'){
    addE(pid,newId,'pc');
    getSpouses(pid).forEach(sp=>addE(sp,newId,'pc'));
  }
  else if(k==='brother'||k==='sister'){
    addE(pid,newId,'sib');
    // give same parents
    getParents(pid).forEach(par=>addE(par,newId,'pc'));
    // connect to other siblings
    getSiblings(pid).forEach(sib=>{if(sib!==newId)addE(sib,newId,'sib')});
  }
  else if(k==='patgf'){
    persons[newId].isMother=false;
    let f=getParents(pid).find(id=>!persons[id]?.isMother);
    if(!f){f=uid();persons[f]={name:'?',placeholder:true,isMother:false,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(f,pid,'pc')}
    addE(newId,f,'pc');
  }
  else if(k==='patgm'){
    persons[newId].isMother=true;
    let f=getParents(pid).find(id=>!persons[id]?.isMother);
    if(!f){f=uid();persons[f]={name:'?',placeholder:true,isMother:false,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(f,pid,'pc')}
    addE(newId,f,'pc');const gf=getParents(f).find(id=>!persons[id]?.isMother);if(gf)addE(gf,newId,'sp');
  }
  else if(k==='matgf'){
    persons[newId].isMother=false;
    let m=getParents(pid).find(id=>persons[id]?.isMother);
    if(!m){m=uid();persons[m]={name:'?',placeholder:true,isMother:true,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(m,pid,'pc')}
    addE(newId,m,'pc');
  }
  else if(k==='matgm'){
    persons[newId].isMother=true;
    let m=getParents(pid).find(id=>persons[id]?.isMother);
    if(!m){m=uid();persons[m]={name:'?',placeholder:true,isMother:true,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(m,pid,'pc')}
    addE(newId,m,'pc');const gf=getParents(m).find(id=>!persons[id]?.isMother);if(gf)addE(gf,newId,'sp');
  }
  else if(k==='nephew'||k==='niece'){
    let sib=getSiblings(pid)[0];
    if(!sib){sib=uid();persons[sib]={name:'?',placeholder:true,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(pid,sib,'sib')}
    addE(sib,newId,'pc');
  }
  else if(k==='uncle'||k==='aunt'){
    const par=getParents(pid)[0];
    if(par)addE(par,newId,'sib');
    else{const p2=uid();persons[p2]={name:'?',placeholder:true,isMother:k==='aunt',dob:'',city:'',gotra:'',naksh:'',notes:''};addE(p2,pid,'pc');addE(p2,newId,'sib')}
  }
  else if(k==='grandchild'){
    const child=getChildren(pid)[0];
    if(child)addE(child,newId,'pc');
    else{const c=uid();persons[c]={name:'?',placeholder:true,dob:'',city:'',gotra:'',naksh:'',notes:''};addE(pid,c,'pc');addE(c,newId,'pc')}
  }

  closeSheet();renderTree();saveTree();showToast(lb().added);confetti();
}

// ══════════════ RENDER — HTML LAYOUT + SVG LINES ══════════════

function assignGens(){
  const ids=Object.keys(persons);
  const gen={};
  // Pass 1: BFS top-down using ONLY parent-child edges
  const pcE=edges.filter(e=>e.t==='pc');
  const hasParent=new Set(pcE.map(e=>e.b));
  let roots=ids.filter(id=>!hasParent.has(id));
  if(!roots.length)roots=[ids[0]];
  roots.forEach(id=>gen[id]=0);
  const q=[...roots];
  while(q.length){
    const id=q.shift();
    getChildren(id).forEach(c=>{
      const want=(gen[id]||0)+1;
      if(gen[c]===undefined||gen[c]<want){gen[c]=want;q.push(c)}
    });
  }
  // Pass 2: spouses and siblings inherit their partner's generation
  let changed=true;
  let pass=0;
  while(changed&&pass<20){
    changed=false;pass++;
    edges.filter(e=>e.t==='sp'||e.t==='sib').forEach(e=>{
      const ga=gen[e.a],gb=gen[e.b];
      if(ga!==undefined&&gb===undefined){gen[e.b]=ga;changed=true}
      else if(gb!==undefined&&ga===undefined){gen[e.a]=gb;changed=true}
      else if(ga!==undefined&&gb!==undefined&&ga!==gb){
        // use the generation of whoever has parents (more structurally anchored)
        const aAnch=getParents(e.a).length>0;
        const bAnch=getParents(e.b).length>0;
        const use=aAnch?ga:bAnch?gb:Math.min(ga,gb);
        if(gen[e.a]!==use){gen[e.a]=use;changed=true}
        if(gen[e.b]!==use){gen[e.b]=use;changed=true}
      }
    });
  }
  // Any remaining unassigned
  ids.filter(id=>gen[id]===undefined).forEach(id=>{gen[id]=0});
  // Normalise to 0-based
  const min=Math.min(...Object.values(gen));
  ids.forEach(id=>{gen[id]-=min});
  return gen;
}

function renderTree(){
  const wrap=document.getElementById('treeWrap');
  // Remove all gen rows (keep SVG)
  Array.from(wrap.children).forEach(c=>{if(c.id!=='linesSvg')c.remove()});
  document.getElementById('linesSvg').innerHTML='';

  const ids=Object.keys(persons);
  if(!ids.length)return;

  const gen=assignGens();
  const byGen={};
  ids.forEach(id=>{const g=gen[id]??0;byGen[g]=byGen[g]||[];byGen[g].push(id)});
  const gens=Object.keys(byGen).map(Number).sort((a,b)=>a-b);

  // Sort each row: every person immediately followed by their spouse,
  // then next sibling immediately followed by their spouse, etc.
  function placeWithSp(id, row, placed, sorted){
    if(placed.has(id)) return;
    sorted.push(id); placed.add(id);
    getSpouses(id).filter(sp=>row.includes(sp)&&!placed.has(sp))
      .forEach(sp=>{ sorted.push(sp); placed.add(sp); });
  }
  gens.forEach(g=>{
    const row=byGen[g];
    const placed=new Set(); const sorted=[];
    const anchored=row.filter(id=>getParents(id).length>0||persons[id]?.isRoot);
    const free=row.filter(id=>!anchored.includes(id)&&!getSpouses(id).some(sp=>anchored.includes(sp)));
    anchored.forEach(id=>{
      if(placed.has(id)) return;
      placeWithSp(id, row, placed, sorted);
      getSiblings(id).filter(sib=>row.includes(sib)&&!placed.has(sib))
        .forEach(sib=>placeWithSp(sib, row, placed, sorted));
    });
    free.forEach(id=>placeWithSp(id, row, placed, sorted));
    row.forEach(id=>{if(!placed.has(id)){sorted.push(id);placed.add(id)}});
    byGen[g]=sorted;
  });

  // Build HTML rows
  const nodeEls={}; // id → DOM element
  gens.forEach(g=>{
    const row=document.createElement('div');
    row.className='gen-row';
    byGen[g].forEach(id=>{
      const p=persons[id];
      const isPlaceholder=p.placeholder&&(!p.name||p.name==='?');
      const wrap2=document.createElement('div');
      wrap2.className='node-wrap';

      const card=document.createElement('div');
      card.className='node'+(p.isRoot?' you':'')+(isPlaceholder?' placeholder':'');
      card.id='nd-'+id;

      // Top bar for YOU
      const topBar=document.createElement('div');
      topBar.className='node-top-bar';
      card.appendChild(topBar);

      const inner=document.createElement('div');
      inner.className='node-inner';

      // Role label
      const role=getRoleStr(id,gen);
      if(role){
        const rl=document.createElement('div');
        rl.className='node-role '+getRoleClass(role);
        rl.textContent=role;
        inner.appendChild(rl);
      }

      // Name
      const nm=document.createElement('div');
      nm.className='node-name';
      nm.textContent=isPlaceholder?'Tap + to add details':(p.name||'?');
      inner.appendChild(nm);

      // Detail
      const parts=[];
      if(p.dob)parts.push(p.dob);
      if(p.naksh)parts.push('✦ '+p.naksh);
      else if(p.city)parts.push(p.city);
      if(parts.length&&!isPlaceholder){
        const dt=document.createElement('div');
        dt.className='node-detail';
        dt.textContent=parts.join(' · ');
        inner.appendChild(dt);
      }

      card.appendChild(inner);

      // Edit button
      if(!isPlaceholder){
        const eb=document.createElement('button');
        eb.className='node-edit';eb.textContent='✎';eb.title='Edit';
        eb.onclick=ev=>{ev.stopPropagation();openEdit(id)};
        card.appendChild(eb);
      }

      card.onclick=()=>isPlaceholder?openAdd(id):openEdit(id);
      nodeEls[id]=card;
      wrap2.appendChild(card);

      // + button
      const ab=document.createElement('button');
      ab.className='add-btn';ab.textContent='+';ab.title='Add family member';
      ab.onclick=ev=>{ev.stopPropagation();openAdd(id)};
      wrap2.appendChild(ab);

      row.appendChild(wrap2);
    });
    wrap.appendChild(row);
  });

  // Draw lines after layout settles
  requestAnimationFrame(()=>requestAnimationFrame(()=>drawLines(nodeEls)));
}

function getRoleStr(id,gen){
  const p=persons[id];
  if(p.isRoot)return lang==='te'?'మీరు':lang==='hi'?'आप':'YOU';
  const rootId=Object.keys(persons).find(x=>persons[x].isRoot);
  if(!rootId)return '';
  const myGen=gen[id]??0,rootGen=gen[rootId]??0;
  if(getSpouses(rootId).includes(id))return lang==='te'?'జీవిత భాగస్వామి':lang==='hi'?'पति/पत्नी':'SPOUSE';
  if(getSiblings(rootId).includes(id))return lang==='te'?'సోదరుడు/సోదరి':lang==='hi'?'भाई/बहन':'SIBLING';
  if(getChildren(rootId).includes(id))return lang==='te'?'బిడ్డ':lang==='hi'?'बच्चे':'CHILD';
  if(myGen<rootGen&&myGen===rootGen-1){
    if(p.isMother)return lang==='te'?'అమ్మ':lang==='hi'?'माता जी':'MOTHER';
    return lang==='te'?'నాన్న':lang==='hi'?'पिता जी':'FATHER';
  }
  if(myGen<rootGen-1)return lang==='te'?'తాతయ్య/అమ్మమ్మ':lang==='hi'?'दादा/नाना':'GRANDPARENT';
  // Spouse of sibling
  if(getSiblings(rootId).some(sib=>getSpouses(sib).includes(id)))
    return lang==='te'?'వదిన/బావ':lang==='hi'?'साला/जीजा':'SIB-SPOUSE';
  return '';
}
function getRoleClass(role){
  if(!role)return 'role-other';
  if(role.includes('YOU')||role.includes('आप')||role.includes('మీరు'))return 'role-you';
  if(role.includes('MOTHER')||role.includes('FATHER')||role.includes('PARENT')||role.includes('माता')||role.includes('पिता')||role.includes('నాన్న')||role.includes('అమ్మ'))return 'role-parent';
  if(role.includes('SPOUSE')||role.includes('पति')||role.includes('భాగస్వామి'))return 'role-spouse';
  if(role.includes('SIBLING')||role.includes('भाई')||role.includes('సోదర'))return 'role-sibling';
  if(role.includes('CHILD')||role.includes('బిడ్డ')||role.includes('बच्चे'))return 'role-child';
  if(role.includes('GRAND')||role.includes('తాతయ్య')||role.includes('दादा'))return 'role-gp';
  return 'role-other';
}

function drawLines(nodeEls){
  const svg=document.getElementById('linesSvg');
  const wrap=document.getElementById('treeWrap');
  const wr=wrap.getBoundingClientRect();
  svg.innerHTML='';

  function pos(id){
    const el=nodeEls[id];if(!el)return null;
    const r=el.getBoundingClientRect();
    return{
      top:r.top-wr.top+wrap.scrollTop,
      bot:r.bottom-wr.top+wrap.scrollTop,
      left:r.left-wr.left+wrap.scrollLeft,
      right:r.right-wr.left+wrap.scrollLeft,
      cx:(r.left+r.right)/2-wr.left+wrap.scrollLeft,
      cy:(r.top+r.bottom)/2-wr.top+wrap.scrollTop,
      w:r.width,h:r.height
    };
  }

  function curve(x1,y1,x2,y2,color){
    const my=(y1+y2)/2;
    const p=mksvg('path');
    p.setAttribute('d',`M${x1} ${y1} C${x1} ${my} ${x2} ${my} ${x2} ${y2}`);
    p.setAttribute('fill','none');p.setAttribute('stroke',color||'rgba(176,122,8,0.45)');
    p.setAttribute('stroke-width','1.6');svg.appendChild(p);
  }
  function hline(x1,x2,y,color,dash){
    const l=mksvg('line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y);l.setAttribute('x2',x2);l.setAttribute('y2',y);
    l.setAttribute('stroke',color||'rgba(176,122,8,0.55)');l.setAttribute('stroke-width','1.6');
    if(dash)l.setAttribute('stroke-dasharray','6 3');svg.appendChild(l);
  }
  function heart(x,y){
    const t=mksvg('text');
    t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');t.setAttribute('fill','rgba(176,122,8,0.55)');
    t.setAttribute('font-size','12');t.textContent='♥';svg.appendChild(t);
  }
  function mksvg(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag)}

  // Size SVG to wrap
  svg.style.width=wrap.scrollWidth+'px';
  svg.style.height=wrap.scrollHeight+'px';

  // ── Parent-child lines ──
  edges.filter(e=>e.t==='pc').forEach(e=>{
    const par=pos(e.a),child=pos(e.b);
    if(!par||!child)return;
    if(par.top>=child.top)return;// parent must be above
    curve(par.cx,par.bot,child.cx,child.top);
  });

  // ── Spouse lines ──
  const drawnSp=new Set();
  edges.filter(e=>e.t==='sp').forEach(e=>{
    const key=[e.a,e.b].sort().join('-');if(drawnSp.has(key))return;drawnSp.add(key);
    const a=pos(e.a),b=pos(e.b);if(!a||!b)return;
    if(Math.abs(a.cy-b.cy)>30)return;// only if same row
    const left=a.left<b.left?a:b,right=a.left<b.left?b:a;
    const gap=right.left-left.right;
    if(gap<4)return;
    const y=Math.min(a.cy,b.cy);
    hline(left.right,right.left,y,'rgba(176,122,8,0.55)',true);
    heart((left.right+right.left)/2,y);
  });

  // ── Sibling bracket ──
  const drawnSib=new Set();
  edges.filter(e=>e.t==='sib').forEach(e=>{
    const key=[e.a,e.b].sort().join('-');if(drawnSib.has(key))return;drawnSib.add(key);
    const a=pos(e.a),b=pos(e.b);if(!a||!b)return;
    if(Math.abs(a.top-b.top)>30)return;// same row only
    const left=a.cx<b.cx?a:b,right=a.cx<b.cx?b:a;
    const by=Math.min(a.top,b.top)-14;
    const path=mksvg('path');
    path.setAttribute('d',`M${left.cx} ${left.top} L${left.cx} ${by} L${right.cx} ${by} L${right.cx} ${right.top}`);
    path.setAttribute('fill','none');path.setAttribute('stroke','rgba(58,110,138,0.45)');
    path.setAttribute('stroke-width','1.3');path.setAttribute('stroke-dasharray','4 3');
    svg.appendChild(path);
  });
}

function shareTree(){
  const root=Object.keys(persons).find(id=>persons[id].isRoot);
  const nm=root?persons[root].name:'Family';
  window.open('https://wa.me/?text='+encodeURIComponent(lb().share(nm)),'_blank');
}

function confetti(){
  const cols=['#C4A055','#D4A830','#3A7A28','#7EC060','#E8C060','#C4781A'];
  for(let i=0;i<24;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cp';
      const sz=4+Math.random()*7;
      el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};transform:rotate(${Math.random()*360}deg);animation-duration:${2+Math.random()*2}s;`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),4500);
    },i*28);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── LocalStorage persistence ─────────────────────────────
const TREE_KEY='vanshavali_tree_builder';

function saveTree(){
  try{
    localStorage.setItem(TREE_KEY,JSON.stringify({persons,edges,nextId,lang}));
  }catch(e){}
}

function loadTree(){
  try{
    const raw=localStorage.getItem(TREE_KEY);
    if(!raw) return false;
    const d=JSON.parse(raw);
    if(!d.persons||!Object.keys(d.persons).length) return false;
    persons=d.persons; edges=d.edges||[]; nextId=d.nextId||1;
    return d.lang||'en';
  }catch(e){ return false; }
}

function clearTree(){
  localStorage.removeItem(TREE_KEY);
  persons={}; edges=[]; nextId=1;
  location.reload();
}

// Re-draw lines on scroll/resize
document.getElementById('canvas').addEventListener('scroll',()=>{
  const nodeEls={};
  Object.keys(persons).forEach(id=>{const el=document.getElementById('nd-'+id);if(el)nodeEls[id]=el});
  drawLines(nodeEls);
});
window.addEventListener('resize',()=>renderTree());

// ─── Init — restore or show language picker ────────────────
const savedLang=loadTree();
if(savedLang&&Object.keys(persons).length>0){
  lang=savedLang;
  document.getElementById('langOverlay').style.display='none';
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.trim()==={en:'EN',te:'తె',hi:'हि'}[lang]));
  renderTree();
  // Show restore toast
  setTimeout(()=>showToast('🌳 Tree restored'),400);
  // Add clear button to header
  const hdr=document.querySelector('header .hright');
  if(hdr){
    const clr=document.createElement('button');
    clr.textContent='Clear';
    clr.style.cssText='padding:5px 10px;font-size:11px;border:1px solid rgba(168,72,24,0.3);border-radius:5px;background:rgba(168,72,24,0.08);color:#A84818;cursor:pointer;font-family:DM Sans,sans-serif';
    clr.onclick=clearTree;
    hdr.insertBefore(clr,hdr.firstChild);
  }
}
// else language overlay is already shown by default
